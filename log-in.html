<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Sign In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/nav-footer.css">
    <link rel="stylesheet" href="css/log-in.css">

</head>
<body>

    <section id="navigation">

        <div id="nav-upper">

            <div class="section left-section">

                <a class="left-section-link" href="index.html">
                    <img class="camp-logo" src="images/icons/Camp.png" alt="Camp logo">
                    <p>Camp Retail.Co</p>
                </a>
        
            </div>
            
        </div>

    </section>

    <section id="log-in">
        
        <div class="log">

            <form class="contain upper">

                <h1>Log In</h1>
                <hr>

                <div class="sign-in-form">

                    <label for="email">Email Address</label>
                    <input type="email" id="email" 
                    placeholder="Type your Email Address" class="fill-in" required>

                </div>

                <div class="sign-in-form">

                    <label for="password">Password</label>   
                    <input type="password" id="password" 
                    placeholder="Passowrd" class="fill-in" required>

                </div>

                <a href="">Forgot your Password?</a>
                
                <div class="upper-low">

                    <hr>
                    <button type="submit" class="log-in-btn btn">Log In</button>

                </div>

            </form>
        
            <div class="contain lower">

                <hr>

                <p>Don't Have your Account?</p>
                <p>Create one now!</p>
                <form action="sign-up.html">
                    <button class="create-btn btn">Create Account</button>
                </form>
                
            </div>
                        
        </div>
    </section>

    <section id="footer">

        <div class="weather">
    
            <a class="weatherwidget-io" href="https://forecast7.com/en/21d9295d96/myanmar-burma/" data-label_1="MYANMAR (BURMA)" data-label_2="WEATHER" data-theme="original" data-basecolor="#000000" data-accent="rgba(0, 0, 0, 0.02)" >MYANMAR (BURMA) WEATHER</a>

    </script>
    
        </div>
    
        <div id="contact-us">
    
            <div class="contact email">
    
                <div class="top">
    
                    <img class="contact-icon" src="images/icons/mail.png" alt="envelope icon">
                    <div class="bottom">
    
                        <a class="rcc" href="email.html">
                            Email Us
                        </a>
    
                    </div>
    
                </div>
    
    
            </div>
            <div class="contact">
    
                <div class="top">
                    <img class="contact-icon" src="images/icons/phone.png" alt="phone icon">
                    <p>09-12345678</p>
                </div>
    
            </div>
            <div class="contact">
    
                <div class="top">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15279.433528300864!2d96.14158066586917!3d16.783719938081727!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x30c1eb70073647e3%3A0x5a14ef9e22b3bc00!2sTaw%20Win%20Centre!5e0!3m2!1sen!2smm!4v1673973768255!5m2!1sen!2smm" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
    
            </div>
    
        </div>
    
    <div class="social-media">
        <h2>Follow Us</h2>
        <div class="media-list">
    
                <form action="https://www.facebook.com/" target="_blank">
                    <button class="media-btn">
                        <img class="media-icon" src="images/icons/FB100.png" alt="FB icon">
                    </button>
                </form>
    
                <form action="https://www.instagram.com/">
                    <button class="media-btn">
                        <img class="media-icon" src="images/icons/Insta100.png" alt="Inst Icon">
                    </button>
                </form>
    
                <form action="https://www.twitter.com/" target="_blank">
                    <button class="media-btn">
                        <img class="media-icon" src="images/icons/twit100.png" alt="Twit Icon">
                    </button>
                </form>
    
                <form action="https://www.youtube.com/" target="_blank">
                    <button class="media-btn">
                        <img class="media-icon" src="images/icons/yt100.png" alt="YT Icon">
                    </button>
                </form>
    
        </div>
    </div>
    
    <div class="email">
        <h2>Subscribe to our news letter!</h2>
        <div class="text-box">
            <input type="email" placeholder="Type your Email Address">
            <button type="submit">Subscribe</button>
        </div>
